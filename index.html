
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --grass: #5D9E2F;
    --dirt: #8B5E3C;
    --stone: #7C7C7C;
    --wood: #A0742A;
    --diamond: #3AFFF4;
    --gold: #FFD700;
    --iron: #D4D4D4;
    --emerald: #17DD62;
    --dark: #1A1A2E;
    --darker: #0D0D1A;
    --panel: #16213E;
    --text: #E8E8E8;
    --muted: #8892A4;
    --pixel-border: 3px solid #000;
  }

  body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; }

  .wrapper {
    min-height: 100vh;
    background: var(--darker);
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(93,158,47,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(58,255,244,0.06) 0%, transparent 50%);
    padding: 0;
    overflow: hidden;
  }

  .pixel-grid {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  .header {
    position: relative;
    z-index: 1;
    padding: 2rem 1.5rem 1rem;
    text-align: center;
    border-bottom: 2px solid rgba(93,158,47,0.3);
    background: linear-gradient(to bottom, rgba(93,158,47,0.15), transparent);
  }

  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 4px;
  }

  .grass-block {
    width: 40px; height: 40px;
    background: var(--grass);
    border: var(--pixel-border);
    position: relative;
    image-rendering: pixelated;
    box-shadow: 3px 3px 0 #000;
    flex-shrink: 0;
  }
  .grass-block::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 55%;
    background: var(--dirt);
    border-top: 2px solid #000;
  }

  .site-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(12px, 3vw, 18px);
    color: var(--grass);
    text-shadow: 3px 3px 0 #000, 0 0 20px rgba(93,158,47,0.5);
    letter-spacing: 1px;
  }

  .site-sub {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--diamond);
    letter-spacing: 2px;
    margin-top: 2px;
  }

  .main {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  .lang-strip {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .lang-btn {
    font-family: 'VT323', monospace;
    font-size: 15px;
    padding: 4px 10px;
    background: var(--panel);
    border: 2px solid var(--stone);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.1s;
    letter-spacing: 1px;
  }
  .lang-btn:hover, .lang-btn.active {
    border-color: var(--grass);
    color: var(--grass);
    background: rgba(93,158,47,0.15);
  }

  .chat-window {
    background: var(--panel);
    border: 3px solid #333;
    border-top: 3px solid #555;
    border-left: 3px solid #555;
    min-height: 360px;
    max-height: 420px;
    overflow-y: auto;
    padding: 1rem;
    margin-bottom: 1rem;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--stone) var(--panel);
  }

  .msg {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    animation: msgIn 0.2s ease-out;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border: 2px solid #000;
    flex-shrink: 0;
    image-rendering: pixelated;
    position: relative;
  }
  .avatar.bot { background: #8B5CF6; }
  .avatar.bot::after {
    content: 'AI';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: #fff;
  }
  .avatar.user-av { background: var(--dirt); }
  .avatar.user-av::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom, var(--dirt) 60%, #7A4F2E 60%);
  }

  .bubble {
    max-width: 80%;
    padding: 8px 12px;
    font-size: 13px;
    line-height: 1.6;
    border: 2px solid #000;
  }
  .msg.bot .bubble {
    background: #1E2D1E;
    border-color: var(--grass);
    color: var(--text);
    border-radius: 0 8px 8px 8px;
  }
  .msg.user .bubble {
    background: #1A1E35;
    border-color: var(--diamond);
    color: var(--text);
    border-radius: 8px 0 8px 8px;
  }

  .bubble code {
    background: rgba(0,0,0,0.4);
    padding: 1px 4px;
    font-family: 'VT323', monospace;
    font-size: 15px;
    color: var(--gold);
    border-radius: 2px;
  }

  .recipe-grid {
    display: grid;
    grid-template-columns: repeat(3, 34px);
    gap: 2px;
    background: #555;
    border: 2px solid #000;
    padding: 2px;
    margin: 8px 0 4px;
  }
  .recipe-cell {
    width: 34px; height: 34px;
    background: #8B8B8B;
    border: 2px solid #000;
    border-top-color: #C6C6C6;
    border-left-color: #C6C6C6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    image-rendering: pixelated;
  }
  .recipe-cell.empty { background: #6B6B6B; }

  .arrow-craft { font-size: 20px; margin: 8px 4px; color: var(--muted); }

  .result-cell {
    width: 44px; height: 44px;
    background: #8B8B8B;
    border: 2px solid #000;
    border-top-color: #C6C6C6;
    border-left-color: #C6C6C6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .craft-row { display: flex; align-items: center; gap: 8px; }

  .quick-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 1rem;
  }

  .quick-btn {
    font-family: 'VT323', monospace;
    font-size: 15px;
    padding: 5px 10px;
    background: #1E2A1E;
    border: 2px solid rgba(93,158,47,0.4);
    color: var(--emerald);
    cursor: pointer;
    transition: all 0.1s;
    white-space: nowrap;
  }
  .quick-btn:hover {
    background: rgba(93,158,47,0.2);
    border-color: var(--grass);
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  .chat-input {
    flex: 1;
    background: #0D1117;
    border: 2px solid #444;
    border-top-color: #222;
    border-left-color: #222;
    color: var(--text);
    padding: 10px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .chat-input:focus { border-color: var(--grass); }
  .chat-input::placeholder { color: var(--muted); font-size: 13px; }

  .send-btn {
    background: var(--grass);
    border: 3px solid #000;
    border-bottom: 3px solid #2D5A10;
    border-right: 3px solid #2D5A10;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.1s;
    text-shadow: 1px 1px 0 #000;
    letter-spacing: 0.5px;
  }
  .send-btn:hover { background: #6BBE35; }
  .send-btn:active {
    border-bottom: 3px solid #000;
    border-right: 3px solid #000;
    border-top: 3px solid #2D5A10;
    border-left: 3px solid #2D5A10;
    transform: translate(1px, 1px);
  }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .typing {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
  }
  .dot {
    width: 6px; height: 6px;
    background: var(--grass);
    animation: bounce 0.8s infinite;
    border-radius: 1px;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-5px); }
  }

  .status-bar {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 11px;
    color: var(--muted);
    font-family: 'VT323', monospace;
    font-size: 14px;
    padding: 6px 0 0;
    letter-spacing: 1px;
  }
  .status-dot { width: 6px; height: 6px; background: var(--emerald); display: inline-block; border-radius: 1px; margin-right: 4px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle {
    position: absolute;
    width: 4px; height: 4px;
    background: var(--grass);
    opacity: 0;
    animation: float linear infinite;
    image-rendering: pixelated;
  }
  @keyframes float {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.2; }
    100% { transform: translateY(-20px) rotate(180deg); opacity: 0; }
  }
</style>

<div class="wrapper">
  <div class="pixel-grid"></div>
  <div class="particles" id="particles"></div>

  <div class="header">
    <div class="logo-row">
      <div class="grass-block"></div>
      <div>
        <div class="site-title">KhobiSMP</div>
        <div class="site-sub">AI Assistant</div>
      </div>
      <div class="grass-block"></div>
    </div>
  </div>

  <div class="main">
    <div class="lang-strip" id="langStrip">
      <button class="lang-btn active" data-lang="en">🇬🇧 EN</button>
      <button class="lang-btn" data-lang="ka">🇬🇪 KA</button>
      <button class="lang-btn" data-lang="ru">🇷🇺 RU</button>
      <button class="lang-btn" data-lang="tr">🇹🇷 TR</button>
      <button class="lang-btn" data-lang="es">🇪🇸 ES</button>
      <button class="lang-btn" data-lang="de">🇩🇪 DE</button>
      <button class="lang-btn" data-lang="fr">🇫🇷 FR</button>
      <button class="lang-btn" data-lang="pt">🇧🇷 PT</button>
      <button class="lang-btn" data-lang="zh">🇨🇳 ZH</button>
      <button class="lang-btn" data-lang="ar">🇸🇦 AR</button>
    </div>

    <div class="quick-btns" id="quickBtns"></div>

    <div class="chat-window" id="chatWindow"></div>

    <div class="input-row">
      <input class="chat-input" id="chatInput" placeholder="Ask anything about Minecraft..." />
      <button class="send-btn" id="sendBtn">SEND ▶</button>
    </div>

    <div class="status-bar">
      <span><span class="status-dot"></span>KhobiSMP Online</span>
      <span>⚔ AI-Powered</span>
      <span id="langLabel">🌐 English</span>
    </div>
  </div>
</div>

<script>
const LANGS = {
  en: { name: "English", placeholder: "Ask anything about Minecraft...", quick: ["How to craft a sword?","How to make a house?","How to find diamonds?","How to tame a wolf?","How to enchant items?"] },
  ka: { name: "ქართული", placeholder: "დაუსვი შეკითხვა Minecraft-ის შესახებ...", quick: ["როგორ გავაკეთო მახვილი?","როგორ ვიშოვო ბრილიანტი?","როგორ მოვათვინიეროთ მგელი?","როგორ ავაშენო სახლი?"] },
  ru: { name: "Русский", placeholder: "Спроси о Minecraft...", quick: ["Как сделать меч?","Как найти алмазы?","Как приручить волка?","Как построить дом?","Как зачаровать предметы?"] },
  tr: { name: "Türkçe", placeholder: "Minecraft hakkında bir şey sor...", quick: ["Kılıç nasıl yapılır?","Elmas nasıl bulunur?","Kurt nasıl evcilleştirilir?","Ev nasıl inşa edilir?"] },
  es: { name: "Español", placeholder: "Pregunta sobre Minecraft...", quick: ["¿Cómo hacer una espada?","¿Cómo encontrar diamantes?","¿Cómo domesticar un lobo?","¿Cómo construir una casa?"] },
  de: { name: "Deutsch", placeholder: "Frag über Minecraft...", quick: ["Wie macht man ein Schwert?","Wie findet man Diamanten?","Wie zähmt man einen Wolf?","Wie baut man ein Haus?"] },
  fr: { name: "Français", placeholder: "Pose une question sur Minecraft...", quick: ["Comment fabriquer une épée?","Comment trouver des diamants?","Comment apprivoiser un loup?","Comment construire une maison?"] },
  pt: { name: "Português", placeholder: "Pergunte sobre Minecraft...", quick: ["Como fazer uma espada?","Como encontrar diamantes?","Como domesticar um lobo?","Como construir uma casa?"] },
  zh: { name: "中文", placeholder: "询问有关Minecraft的问题...", quick: ["如何制作剑?","如何找到钻石?","如何驯服狼?","如何建造房子?","如何附魔物品?"] },
  ar: { name: "العربية", placeholder: "اسأل عن ماين كرافت...", quick: ["كيف تصنع سيفاً?","كيف تجد الماس?","كيف تروّض ذئباً?","كيف تبني منزلاً?"] }
};

let currentLang = 'en';
const chatWindow = document.getElementById('chatWindow');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const quickBtns = document.getElementById('quickBtns');
const langLabel = document.getElementById('langLabel');

function setLang(lang) {
  currentLang = lang;
  const l = LANGS[lang];
  chatInput.placeholder = l.placeholder;
  langLabel.textContent = '🌐 ' + l.name;
  renderQuickBtns();
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
}

function renderQuickBtns() {
  quickBtns.innerHTML = LANGS[currentLang].quick.map(q =>
    `<button class="quick-btn" onclick="askQuestion(${JSON.stringify(q)})">${q}</button>`
  ).join('');
}

function addMsg(role, html) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const isBot = role === 'bot';
  div.innerHTML = `
    <div class="avatar ${isBot ? 'bot' : 'user-av'}"></div>
    <div class="bubble">${html}</div>
  `;
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `<div class="avatar bot"></div><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function buildRecipe(items, result, resultEmoji) {
  const cells = items.map(i => `<div class="recipe-cell ${i ? '' : 'empty'}">${i || ''}</div>`).join('');
  return `<div class="craft-row"><div class="recipe-grid">${cells}</div><span class="arrow-craft">→</span><div class="result-cell">${resultEmoji}</div></div><div style="font-size:12px;color:var(--muted);margin-top:4px;">Result: ${result}</div>`;
}

const RECIPES = {
  sword: { items: ['','🪵','','','🪵','','','🥢',''], name: 'Wooden Sword', emoji: '🗡️' },
  diamond_sword: { items: ['','💎','','','💎','','','🥢',''], name: 'Diamond Sword', emoji: '⚔️' },
  crafting_table: { items: ['🪵','🪵','','🪵','🪵','','','',''], name: 'Crafting Table', emoji: '🔨' },
  pickaxe: { items: ['🪵','🪵','🪵','','🥢','','','🥢',''], name: 'Wooden Pickaxe', emoji: '⛏️' },
  torch: { items: ['','🪨','','','🥢','','','',''], name: 'Torches (4)', emoji: '🔦' },
  bow: { items: ['','🥢','🧵','🥢','','🧵','','🥢','🧵'], name: 'Bow', emoji: '🏹' },
};

function getRecipeKey(question) {
  const q = question.toLowerCase();
  if (q.includes('diamond sword') || q.includes('diamond') && q.includes('sword')) return 'diamond_sword';
  if (q.includes('sword') || q.includes('მახვილი') || q.includes('меч') || q.includes('kılıç') || q.includes('espada') || q.includes('schwert') || q.includes('épée') || q.includes('剑') || q.includes('سيف')) return 'sword';
  if (q.includes('pickaxe') || q.includes('кирка') || q.includes('kazma') || q.includes('pico') || q.includes('⛏')) return 'pickaxe';
  if (q.includes('torch') || q.includes('факел') || q.includes('meşale') || q.includes('antorcha') || q.includes('fackel') || q.includes('torche') || q.includes('火把') || q.includes('مشعل')) return 'torch';
  if (q.includes('crafting table') || q.includes('workbench') || q.includes('{stol') || q.includes('столик') || q.includes('masa')) return 'crafting_table';
  if (q.includes('bow') || q.includes('лук') || q.includes('yay') || q.includes('arco') || q.includes('bogen') || q.includes('arc') || q.includes('弓') || q.includes('قوس')) return 'bow';
  return null;
}

async function askQuestion(question) {
  if (!question.trim()) return;
  addMsg('user', escapeHtml(question));
  chatInput.value = '';
  sendBtn.disabled = true;
  showTyping();

  const langName = LANGS[currentLang].name;
  const systemPrompt = `You are KhobiSMP AI, a helpful Minecraft assistant for the KhobiSMP server. 
Answer in ${langName}. Be friendly and enthusiastic like a Minecraft player. 
Keep answers concise (3-5 sentences). Use Minecraft terminology. 
If asked about crafting, explain ingredients briefly. 
End each answer with a fun Minecraft tip or emoji. 
Never break character.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: question }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || 'Sorry, could not get a response!';
    removeTyping();

    const recipeKey = getRecipeKey(question);
    let html = escapeHtml(text).replace(/\n/g, '<br>');

    if (recipeKey) {
      const r = RECIPES[recipeKey];
      html += buildRecipe(r.items, r.name, r.emoji);
    }

    addMsg('bot', html);
  } catch (e) {
    removeTyping();
    addMsg('bot', '⚠️ Connection error! Check your network or try again. <code>/reload</code>');
  }
  sendBtn.disabled = false;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('langStrip').addEventListener('click', e => {
  if (e.target.dataset.lang) setLang(e.target.dataset.lang);
});

sendBtn.addEventListener('click', () => askQuestion(chatInput.value));
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') askQuestion(chatInput.value); });

function createParticles() {
  const p = document.getElementById('particles');
  const colors = ['#5D9E2F','#3AFFF4','#FFD700','#8B5CF6','#17DD62'];
  for (let i = 0; i < 18; i++) {
    const d = document.createElement('div');
    d.className = 'particle';
    d.style.left = Math.random() * 100 + '%';
    d.style.background = colors[Math.floor(Math.random() * colors.length)];
    d.style.animationDuration = (8 + Math.random() * 12) + 's';
    d.style.animationDelay = (Math.random() * 10) + 's';
    d.style.width = d.style.height = (Math.random() > 0.5 ? 4 : 6) + 'px';
    p.appendChild(d);
  }
}

createParticles();
setLang('en');

addMsg('bot', '⚔ Welcome to <strong>KhobiSMP AI Assistant</strong>!<br>Ask me anything about Minecraft — crafting, survival, building, mobs, enchanting and more. Pick your language above! 🌍');
</script>
